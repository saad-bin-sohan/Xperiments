name: mobile
description: Xperiments mobile app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # ✅ Riverpod (aligned)
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.2

  go_router: ^17.2.0

  # Firebase
  firebase_core: ^4.1.0
  firebase_auth: ^6.0.2
  cloud_firestore: ^6.0.1
  firebase_remote_config: ^6.1.0
  firebase_messaging: ^16.0.2
  firebase_storage: ^13.0.1

  flutter_image_compress: ^2.4.0
  flutter_timezone: ^5.0.2
  google_sign_in: ^7.2.0
  google_fonts: ^8.0.2
  home_widget: ^0.9.0
  image_picker: ^1.2.0

  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  intl: ^0.20.2
  package_info_plus: ^10.0.0
  path: ^1.9.1
  path_provider: ^2.1.5
  share_plus: ^13.0.0
  table_calendar: ^3.1.2
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

  # ✅ Codegen (aligned)
  build_runner: ^2.4.13
  riverpod_generator: ^4.0.3
  riverpod_lint: ^3.1.3

  freezed: ^3.2.5
  json_serializable: ^6.11.0

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "logo.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "logo.png"
  windows:
    generate: true
    image_path: "logo.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "logo.png"

flutter:
  uses-material-design: true
